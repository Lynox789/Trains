<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>europe.transports | Choix du trajet</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/trajets.css">
</head>
<body>

    <header class="navbar">
        <div class="logo"><img src="img/Logo.svg" alt="europe.transports"></div>
        <nav>
            <div class="nav-links">
                <a href="dashboard.html">Voyager</a>
                <a href="#">Billets</a>
                <a href="#">Compte</a>
                <a href="#">Contact</a>
                <button id="btn-auth" class="btn-member"><img src="img/Member.svg" alt="">Espace Adhérent</button>
            </div>
        </nav>
        <div class="navbar_right">
            <div class="cyber-toggle-wrapper">
                <input class="cyber-toggle-checkbox" id="cyber-toggle" type="checkbox" />
                <label class="cyber-toggle" for="cyber-toggle">
                    <div class="cyber-toggle-track">
                        <div class="cyber-toggle-track-glow"></div>
                        <div class="cyber-toggle-track-dots">
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                        </div>
                    </div>
                    <div class="cyber-toggle-thumb">
                        <div class="cyber-toggle-thumb-shadow"></div>
                        <div class="cyber-toggle-thumb-highlight"></div>
                        <div class="cyber-toggle-thumb-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M16.5 12c0-2.48-2.02-4.5-4.5-4.5s-4.5 2.02-4.5 4.5 2.02 4.5 4.5 4.5 4.5-2.02 4.5-4.5zm-4.5 7.5c-4.14 0-7.5-3.36-7.5-7.5s3.36-7.5 7.5-7.5 7.5 3.36 7.5 7.5-3.36 7.5-7.5 7.5zm0-16.5c-4.97 0-9 4.03-9 9h-3l3.89 3.89.07.14 4.04-4.03h-3c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42c1.63 1.63 3.87 2.64 6.36 2.64 4.97 0 9-4.03 9-9s-4.03-9-9-9z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="cyber-toggle-particles">
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                    </div>
                </label>
                <div class="cyber-toggle-labels">
                    <span class="cyber-toggle-label-off">Dark</span>
                    <span class="cyber-toggle-label-on">Light</span>
                </div>
            </div>
            <!-- Burger mobile -->
            <button class="nav-burger" id="burger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>
    <!-- Menu mobile (hors header) -->
    <div class="nav-mobile" id="nav-mobile">
        <a href="dashboard.html">Voyager</a>
        <a href="#">Billets</a>
        <a href="#">Compte</a>
        <a href="#">Contact</a>
        <button id="btn-auth-mobile" class="btn-member">
            <img src="img/Member.svg" alt="">Espace Adhérent
        </button>
    </div>

    <main class="container">
        <div class="left-col">
            <h1 class="Titre_principal" id="titre-trajet">Trajets disponibles</h1>
            
            <div class="calendar-wrapper">
                <button class="scroll-btn" id="scroll-left"><</button>
                <div class="calendar-grid" id="calendar-grid"></div>
                <button class="scroll-btn" id="scroll-right">></button>
            </div>

            <div class="trajets-list" id="trajets-container"></div>
        </div>
    </main>

    <div class="options-overlay" id="options-panel">
        <div class="options-panel-content">
            
            <div class="options-header">
                <h2 class="Titre_principal" style="margin:0; font-size: 1.5rem;">Options du billet</h2>
                <button id="close-options" class="btn-close">X</button>
            </div>
            
            <div class="options-scrollable-area">
                <div id="recap-train-choisi" class="recap-train">
                    </div>

                <div class="options-list">
                    <h3>Options disponibles</h3>
                    
                    <label class="option-card checkbox-card">
                        <input type="checkbox" name="option_tranquille" data-prix="3">
                        <div class="option-info">
                            <span class="option-title">Place tranquille</span>
                            <span class="option-desc">Espace calme.</span>
                        </div>
                        <strong class="option-price">+3,00€</strong>
                    </label>

                    <label class="option-card checkbox-card">
                        <input type="checkbox" name="option_prise" data-prix="2">
                        <div class="option-info">
                            <span class="option-title">Prise électrique</span>
                            <span class="option-desc">Prise garantie.</span>
                        </div>
                        <strong class="option-price">+2,00€</strong>
                    </label>

                    <label class="option-card checkbox-card">
                        <input type="checkbox" name="option_bagage" data-prix="5">
                        <div class="option-info">
                            <span class="option-title">Bagage supplémentaire</span>
                            <span class="option-desc">Une valise en plus.</span>
                        </div>
                        <strong class="option-price">+5,00€</strong>
                    </label>
                    
                    <label class="option-card checkbox-card">
                        <input type="checkbox" name="option_sms" data-prix="1">
                        <div class="option-info">
                            <span class="option-title">Info par SMS</span>
                            <span class="option-desc">Infos en temps réel.</span>
                        </div>
                        <strong class="option-price">+1,00€</strong>
                    </label>
                    
                    <label class="option-card checkbox-card">
                        <input type="checkbox" name="option_annulation" data-prix="2.9">
                        <div class="option-info">
                            <span class="option-title">Garantie Annulation</span>
                            <span class="option-desc">Remboursement simplifié.</span>
                        </div>
                        <strong class="option-price">+2,90€</strong>
                    </label>
                </div>
            </div>

            <div class="options-footer">
                <div class="total-row">
                    <span>Total à payer</span>
                    <span class="total-amount"><span id="prix-total-options">0.00</span> €</span>
                </div>
                <button id="btn-valider-options" class="btn-add" style="margin-top:0; width:100%;">Valider et Continuer</button>
            </div>

        </div>
    </div>

    <script src="../js/trajets_fetch.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/logout.js"></script>
</body>
</html>
