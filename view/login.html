<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Votre Banque</title> 
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-wrapper">

        <div class="login-showcase">
            <div class="showcase-overlay"></div>
            
            <div class="slide" style="animation-delay: 0s; background-image: url('images/img1.svg');"></div>
            <div class="slide" style="animation-delay: 5s; background-image: url('images/img2.jpg');"></div>
            <div class="slide" style="animation-delay: 10s; background-image: url('images/img3.svg');"></div>
            <div class="slide" style="animation-delay: 15s; background-image: url('images/img4.svg');"></div>
            
            <div class="showcase-content">
                <h1>Bienvenue </h1>
                <h2>Sur votre site de Transport.</h2>
                <p style="font-size: 1.2rem; color: #A0AEC0;">Gérez vos voyages avec précision et visibilité.</p>
            </div>
        </div>

        <div class="login-form-container">
            <div class="form-window" id="form-window">

                <div class="form-slider">
                    
                    <form id="login-form">
                        <h1 class="form-title">Connexion</h1>
                        <div class="form-group">
                            <label for="login-id">Identifiant client (Email)</label>
                            <input type="email" id="login-id" name="client_id" required> 
                        </div>
                        <div class="form-group">
                            <label for="login-password">Mot de passe</label>
                            <input type="password" id="login-password" name="password" required>
                            <span class="toggle-password">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 9.93 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L21.73 22 20.46 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                            </span>
                        </div>
                        <div style="text-align: right; margin-top: -15px; margin-bottom: 20px;">
                            <a href="#" style="color: #3182CE; font-size: 0.9rem; text-decoration: none;">
                                Mot de passe oublié ?
                            </a>
                        </div>

                        <button type="submit" class="btn-submit">Se connecter</button>

                        <div class="toggle-link">
                            <a id="link-to-register">Pas de compte ? S'inscrire</a>
                        </div>
                    </form>     
                    
                    <form id="register-form">
                        <h1 class="form-title">Inscription</h1>
                        <div class="form-group">
                            <label for="register-nom">Nom complet</label>
                            <input type="text" id="register-nom" name="nom_complet" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Mot de passe</label>
                            <input type="password" id="register-password" name="password" required>
                             <span class="toggle-password">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 9.93 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L21.73 22 20.46 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                            </span>
                        </div>
                        
                        
                        <div class="form-group">
                            <label for="register-password-confirm">Confirmer le mot de passe</label>
                            <input type="password" id="register-password-confirm" name="password_confirm" required>
                             <span class="toggle-password">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 9.93 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L21.73 22 20.46 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                            </span>
                        </div>
                        <button type="submit" class="btn-submit">Créer un compte</button>
                        <div class="toggle-link">
                            <a id="link-to-login">Déjà un compte ? Se connecter</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

<script>
    // Soumission de la connexion
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Maintenant que "action" est parti, ceci empêchera de recharger la page
        const email = document.getElementById('login-id').value; 
        const password = document.getElementById('login-password').value;

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
        localStorage.setItem('user', JSON.stringify({ 
            id: data.id, 
            nom_complet: data.nom_complet,
            email: data.email 
        }));            
        // Redirection selon le rôle
            if (data.user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } else {
            alert(data.message); // Si mauvais mdp ou email
        }
    });

    // Soumission de l'inscription
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nom_complet = document.getElementById('register-nom').value;
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const password_confirm = document.getElementById('register-password-confirm').value;

        if (password !== password_confirm) {
            alert('Les mots de passe ne correspondent pas.');
            return;
        }
        
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom_complet, email, password })
        });
        const data = await res.json();
        if (data.success) {
            alert('Inscription réussie ! Vous pouvez vous connecter.');
            document.querySelector('.form-slider').style.transform = 'translateX(0)'; // Retour vers login
        } else {
            alert(data.message);
        }
    });

    // Animation du slider pour l'inscription/connexion
    document.getElementById('link-to-register').addEventListener('click', () => {
        document.getElementById('form-window').classList.add('show-register');
    });
    document.getElementById('link-to-login').addEventListener('click', () => {
        document.getElementById('form-window').classList.remove('show-register');
    });
</script>
    
</body>
</html>
