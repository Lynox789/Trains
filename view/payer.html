<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - europe.transports</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/payer.css">
    <style>
        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .payment-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .timer { font-size: 1.5rem; color: #ef4444; text-align: center; margin-bottom: 20px; font-weight: 800; }
        .ref-resa { text-align: center; font-size: 1.1rem; margin-bottom: 20px; color: var(--text-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; opacity: 0.8; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1rem; }
        .row-inputs { display: flex; gap: 15px; }
        .btn-payer { width: 100%; height: 50px; background: var(--accent-color); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
        #loading { display: none; text-align: center; margin-top: 20px; color: var(--accent-color); font-weight: 500; }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="Titre_principal" style="text-align: center;">Paiement</h1>
        
        <div class="payment-card">
            <div class="timer" id="timer">03:00</div>
            
            <div class="ref-resa">Référence de réservation : <strong id="ref-display" style="color: var(--accent-color);"></strong></div>
            
            <div style="text-align:center; font-size: 1.5rem; font-weight: bold; margin-bottom: 25px;">
                Total : <span id="total-pay" style="color: var(--accent-color);">0.00</span> €
            </div>

            <form id="form-paiement">
                <div class="form-group">
                    <label>Nom sur la carte</label>
                    <input type="text" required placeholder="Ex: Jean Dupont">
                </div>
                <div class="form-group">
                    <label>Numéro de CB</label>
                    <input type="text" maxlength="16" pattern="\d{16}" required placeholder="1234 5678 1234 5678">
                </div>
                <div class="row-inputs">
                    <div class="form-group" style="flex: 1;">
                        <label>Date Exp. (MM/AA)</label>
                        <input type="text" maxlength="5" placeholder="12/26" required pattern="(0[1-9]|1[0-2])\/\d{2}">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Trigramme (CVV)</label>
                        <input type="text" maxlength="3" pattern="\d{3}" required placeholder="123">
                    </div>
                </div>
                <button type="submit" class="btn-payer">Payer et valider</button>
            </form>
            
            <div id="loading">Vérification auprès de la banque en cours...</div>
        </div>
    </main>
    <script src="../js/payer.js"></script>
</body>
</html>
