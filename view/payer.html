<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - europe.transports</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/payer.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><img src="img/Logo.svg" alt=""></div>
        <nav>
            <a href="dashboard.html">Voyager</a>
            <a href="#">Billets</a>
            <a href="#">Compte</a>
            <a href="#">Contact</a>
            <button class="btn-member" id="btn-auth"><img src="img/Member.svg" alt="">Espace Adhérent</button>
        </nav>
        <div class="navbar_right">
            <div class="cyber-toggle-wrapper">
                <input class="cyber-toggle-checkbox" id="cyber-toggle" type="checkbox" />
                <label class="cyber-toggle" for="cyber-toggle">
                    <div class="cyber-toggle-track">
                        <div class="cyber-toggle-track-glow"></div>
                        <div class="cyber-toggle-track-dots">
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                        </div>
                    </div>
                    <div class="cyber-toggle-thumb">
                        <div class="cyber-toggle-thumb-shadow"></div>
                        <div class="cyber-toggle-thumb-highlight"></div>
                        <div class="cyber-toggle-thumb-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M16.5 12c0-2.48-2.02-4.5-4.5-4.5s-4.5 2.02-4.5 4.5 2.02 4.5 4.5 4.5 4.5-2.02 4.5-4.5zm-4.5 7.5c-4.14 0-7.5-3.36-7.5-7.5s3.36-7.5 7.5-7.5 7.5 3.36 7.5 7.5-3.36 7.5-7.5 7.5zm0-16.5c-4.97 0-9 4.03-9 9h-3l3.89 3.89.07.14 4.04-4.03h-3c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42c1.63 1.63 3.87 2.64 6.36 2.64 4.97 0 9-4.03 9-9s-4.03-9-9-9z"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="cyber-toggle-particles">
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                    </div>
                </label>
                <div class="cyber-toggle-labels">
                    <span class="cyber-toggle-label-off">Dark</span>
                    <span class="cyber-toggle-label-on">Light</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="Titre_principal">Paiement</h1>
        
        <div class="payment-card">
            <div class="timer" id="timer">03:00</div>
            
            <div class="ref-resa">
                Référence de réservation : <strong id="ref-display" style="color: var(--accent-color);"></strong>
            </div>
            
            <div class="total-section">
                <span>Total à régler</span>
                <span class="total-price"><span id="total-pay">0.00</span> €</span>
            </div>

            <form id="form-paiement">
                <div class="form-group">
                    <label>Nom sur la carte</label>
                    <input type="text" required placeholder="Ex: Jean Dupont">
                </div>
                <div class="form-group">
                    <label>Numéro de carte</label>
                    <input type="text" maxlength="16" pattern="\d{16}" required placeholder="1234 5678 1234 5678">
                </div>
                <div class="row-inputs">
                    <div class="form-group" style="flex: 1;">
                        <label>Date Exp. (MM/AA)</label>
                        <input type="text" maxlength="5" placeholder="12/26" required pattern="(0[1-9]|1[0-2])\/\d{2}">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Trigramme (CVV)</label>
                        <input type="text" maxlength="3" pattern="\d{3}" required placeholder="123">
                    </div>
                </div>
                <button type="submit" class="btn-checkout">Payer et valider</button>
            </form>
            
            <div id="loading">Vérification auprès de la banque en cours...</div>
        </div>
    </main>
    
    <script src="../js/theme.js"></script>
    <script src="../js/payer.js"></script>
</body>
</html>
