<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>europe.transports | Panier</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/panier.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><img src="img/Logo.svg" alt="europe.transports"></div>
        <nav>
            <div class="nav-links">
                <a href="dashboard.html">Voyager</a>
                <a href="#">Billets</a>
                <a href="#">Compte</a>
                <a href="#">Contact</a>
                <button id="btn-auth" class="btn-member"><img src="img/Member.svg" alt="">Espace Adhérent</button>
            </div>
        </nav>
        <div class="navbar_right">
            <div class="cyber-toggle-wrapper">
                <input class="cyber-toggle-checkbox" id="cyber-toggle" type="checkbox" />
                <label class="cyber-toggle" for="cyber-toggle">
                    <div class="cyber-toggle-track">
                        <div class="cyber-toggle-track-glow"></div>
                        <div class="cyber-toggle-track-dots">
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                            <span class="cyber-toggle-track-dot"></span>
                        </div>
                    </div>
                    <div class="cyber-toggle-thumb">
                        <div class="cyber-toggle-thumb-shadow"></div>
                        <div class="cyber-toggle-thumb-highlight"></div>
                        <div class="cyber-toggle-thumb-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M16.5 12c0-2.48-2.02-4.5-4.5-4.5s-4.5 2.02-4.5 4.5 2.02 4.5 4.5 4.5 4.5-2.02 4.5-4.5zm-4.5 7.5c-4.14 0-7.5-3.36-7.5-7.5s3.36-7.5 7.5-7.5 7.5 3.36 7.5 7.5-3.36 7.5-7.5 7.5zm0-16.5c-4.97 0-9 4.03-9 9h-3l3.89 3.89.07.14 4.04-4.03h-3c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42c1.63 1.63 3.87 2.64 6.36 2.64 4.97 0 9-4.03 9-9s-4.03-9-9-9z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="cyber-toggle-particles">
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                        <span class="cyber-toggle-particle"></span>
                    </div>
                </label>
                <div class="cyber-toggle-labels">
                    <span class="cyber-toggle-label-off">Dark</span>
                    <span class="cyber-toggle-label-on">Light</span>
                </div>
            </div>
            <!-- Burger mobile -->
            <button class="nav-burger" id="burger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>
    <!-- Menu mobile (hors header) -->
    <div class="nav-mobile" id="nav-mobile">
        <a href="dashboard.html">Voyager</a>
        <a href="#">Billets</a>
        <a href="#">Compte</a>
        <a href="#">Contact</a>
        <button id="btn-auth-mobile" class="btn-member">
            <img src="img/Member.svg" alt="">Espace Adhérent
        </button>
    </div>

    <main class="container">
        <h1 class="Titre_principal">Mon Panier</h1>
        
        <div id="liste-billets">
            </div>

        <div class="panier-footer">
            <div class="total-row">
                <span>TOTAL À PAYER</span>
                <span class="total-amount-val"><span id="prix-total">0.00</span> €</span>
            </div>
            
            <button class="btn-add btn-confirm-order" onclick="confirmerCommande()">
                Confirmer la commande
            </button>
        </div>
    </main>

    <script src="../js/panier.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/logout.js"></script>

</body>
</html>
