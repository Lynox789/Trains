        </button>
    </div>

    <main class="container">
        <h1 class="Titre_principal">Contactez-nous</h1>

        <div class="contact-layout">
            
            <div class="team-section">
                <h2>Notre Équipe</h2>
                <div class="team-grid">
                    <div class="team-member">
                        <img src="pfp/yanis.jpg" alt="Yanis" class="member-avatar">
                        <h3>Yanis</h3>
                        <p>Développeur</p>
                    </div>
                    <div class="team-member">
                        <img src="pfp/Titi.png" alt="Thino" class="member-avatar">
                        <h3>Thino</h3>
                        <p>Développeur</p>
                    </div>
                    <div class="team-member">
                        <img src="pfp/val.jpeg" alt="Valentin" class="member-avatar">
                        <h3>Valentin</h3>
                        <p>Développeur</p>
                    </div>
                    <div class="team-member">
                        <img src="pfp/seb.jpg" alt="Sébastien" class="member-avatar">
                        <h3>Sébastien</h3>
                        <p>Développeur</p>
                    </div>
                    <div class="team-member">
                        <img src="pfp/gab.jpeg" alt="Gabriel" class="member-avatar">
                        <h3>Gabriel</h3>
                        <p>Développeur</p>
                    </div>
                    <div class="team-member">
                        <img src="pfp/tran.jpeg" alt="Tran" class="member-avatar">
                        <h3>Tran</h3>
                        <p>Développeur</p>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="contact-card">
                    <form id="contact-form">
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" required placeholder="Votre nom">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" required placeholder="votre@email.com">
                        </div>
                        <div class="form-group">
                            <label>Sujet</label>
                            <input type="text" required placeholder="Sujet de votre message">
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea required placeholder="Comment pouvons-nous vous aider ?"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Envoyer le message</button>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/theme.js"></script>
    <script src="../js/logout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const btnAuth = document.getElementById('btn-auth');
            
            if (user && btnAuth) {
                btnAuth.innerHTML = `<img src="img/Member.svg" alt=""> ${user.nom_complet} (Déconnexion)`;
                btnAuth.addEventListener('click', () => {
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                });
            } else if (btnAuth) {
                btnAuth.addEventListener('click', () => {
                    window.location.href = 'login.html';
                });
            }
        });

        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Merci pour votre message ! Notre équipe vous répondra très vite.");
            this.reset();
        });
    </script>
</body>
